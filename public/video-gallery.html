<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsGuru Videos</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;padding:20px}
  h1{text-align:center;font-size:2rem;margin-bottom:30px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;max-width:1400px;margin:0 auto}
  .card{background:#16213e;border-radius:16px;padding:16px;border:1px solid #0f3460}
  h2{color:#e94560;font-size:1rem;margin-bottom:10px}
  video{width:100%;border-radius:10px;background:#000;max-height:300px}
  .info{color:#aaa;font-size:0.85rem;margin-top:8px;display:flex;justify-content:space-between}
  .tag{padding:3px 8px;border-radius:6px;font-size:0.75rem}
  .tag.swara{background:#e94560;color:#fff}
  .tag.madhur{background:#533483;color:#fff}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>🎬 MathsGuru Videos</h1>
<div class="grid">
  <div class="card">
    <h2>🔵 Bindu (Point)</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_bindu.mp4" type="video/mp4">
    </video>
    <div class="info"><span>2.3 MB</span><span class="tag swara">SwaraNeural</span></div>
  </div>
  <div class="card">
    <h2>📏 Rekha (Line)</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_rekha.mp4" type="video/mp4">
    </video>
    <div class="info"><span>1.7 MB</span><span class="tag swara">SwaraNeural</span></div>
  </div>
  <div class="card">
    <h2>✂️ Segment (Khand)</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_segment.mp4" type="video/mp4">
    </video>
    <div class="info"><span>1.2 MB</span><span class="tag swara">SwaraNeural</span></div>
  </div>
  <div class="card">
    <h2>☀️ Kiran (Ray)</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_kiran_manim_chalkboard.mp4" type="video/mp4">
    </video>
    <div class="info"><span>1.5 MB</span><span class="tag swara">SwaraNeural</span></div>
  </div>
  <div class="card">
    <h2>🌀 Geometry Intro</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_geometry_intro.mp4" type="video/mp4">
    </video>
    <div class="info"><span>356 KB</span><span class="tag madhur">MadhurNeural</span></div>
  </div>
  <div class="card">
    <h2>📊 Max Min Intro</h2>
    <video controls preload="metadata">
      <source src="videos/FINAL_maxmin_intro.mp4" type="video/mp4">
    </video>
    <div class="info"><span>355 KB</span><span class="tag madhur">MadhurNeural</span></div>
  </div>
</div>
<script>
  document.querySelectorAll('video').forEach(v=>{
    v.addEventListener('play',()=>{document.querySelectorAll('video').forEach(o=>{if(o!==v)o.pause()})});
  });
</script>
</body>
</html>
